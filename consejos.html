<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSEJOS VIP | SAMUEL HACK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --neon-green: #00ff7f;
            --neon-blue: #00bfff;
            --dark-bg: #000000;
            --dark-card: rgba(10, 10, 10, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; }

        /* --- PANTALLA MANTENIMIENTO "ESTILO IMAGEN" --- */
        #maint-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 30000; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        .maint-tit-clean {
            font-family: 'Orbitron'; font-size: clamp(1.5rem, 8vw, 2.8rem);
            color: var(--neon-green); font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 0 20px rgba(0, 255, 127, 0.4);
            margin-bottom: 5px;
        }

        .maint-sub-clean {
            font-family: 'Rajdhani'; color: #666; text-transform: uppercase;
            letter-spacing: 4px; font-size: 0.9rem; font-weight: 700; margin-bottom: 50px;
        }

        .timer-giant {
            font-family: 'Orbitron'; font-size: clamp(3rem, 15vw, 6rem);
            color: #fff; font-weight: 900; letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2); margin-bottom: 60px;
        }

        .brand-footer {
            font-family: 'Orbitron'; font-size: 1.2rem; color: #222;
            font-weight: 900; letter-spacing: 12px; margin-top: 20px;
        }

        /* --- HEADER Y ESTRUCTURA --- */
        .handler {
            position: fixed; top: 0; width: 100%; height: 55px;
            background: linear-gradient(180deg, rgba(0,255,127,0.15) 0%, rgba(0,0,0,0.95) 100%);
            border-bottom: 1px solid rgba(0, 255, 127, 0.4);
            z-index: 1000; display: flex; justify-content: space-between;
            align-items: center; padding: 0 40px; backdrop-filter: blur(10px);
        }
        .handler-logo { font-family: 'Orbitron'; font-size: 1rem; font-weight: 900; letter-spacing: 4px; background: linear-gradient(to right, #fff, var(--neon-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pill { display: flex; align-items: center; gap: 10px; background: rgba(0, 0, 0, 0.6); padding: 5px 15px; border-radius: 50px; border: 1px solid var(--neon-green); font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-green); }
        .dot { height: 8px; width: 8px; background-color: var(--neon-green); border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .user-stats-panel { position: fixed; top: 55px; width: 100%; z-index: 999; display: flex; justify-content: center; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(0, 191, 255, 0.2); padding: 5px 0; backdrop-filter: blur(5px); }
        .stat-badge { font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; color: #fff; }
        .stat-value { color: var(--neon-blue); font-weight: 900; text-shadow: 0 0 5px var(--neon-blue); }

        .main-content { position: relative; z-index: 10; width: 100%; max-width: 1100px; margin: 160px auto 100px; padding: 0 20px; }
        .btn-back { display: inline-block; margin-bottom: 30px; text-decoration: none; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 1px; }
        
        .search-area { position: relative; margin-bottom: 50px; }
        .search-bar { width: 100%; padding: 18px 18px 18px 60px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,127,0.2); color: #fff; font-size: 1.1rem; border-radius: 4px; outline: none; font-family: 'Rajdhani'; }
        .search-area i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--neon-green); font-size: 1.2rem; }

        .grid-tips { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .tip-card { background: var(--dark-card); border: 1px solid rgba(0, 255, 127, 0.2); border-radius: 4px; overflow: hidden; transition: 0.4s; cursor: pointer; animation: fadeInUp 0.5s ease backwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .tip-img { width: 100%; height: 180px; object-fit: cover; filter: brightness(0.7); }
        .tip-body { padding: 25px; }
        .tip-title { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; margin-bottom: 8px; }
        .tip-subtitle { font-family: 'Rajdhani'; font-size: 0.8rem; color: var(--neon-green); font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .tip-preview { color: #666; font-size: 0.9rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- MODAL RECUPERADO CON VIDEO --- */
        #modal-tip { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(15px); padding: 15px; }
        .m-content { background: #050505; border: 1px solid var(--neon-green); width: 100%; max-width: 500px; max-height: 90vh; border-radius: 8px; position: relative; display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9); opacity: 0; transition: 0.3s; }
        #modal-tip.active .m-content { transform: scale(1); opacity: 1; }

        .m-header-img { width: 100%; max-height: 200px; object-fit: cover; border-bottom: 1px solid var(--neon-green); }
        .m-inner { padding: 25px; overflow-y: auto; flex-grow: 1; }
        .m-inner::-webkit-scrollbar { width: 4px; }
        .m-inner::-webkit-scrollbar-thumb { background: var(--neon-green); }

        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; display: none; margin: 15px 0; border: 1px solid var(--neon-green); border-radius: 4px; }
        .video-box iframe { width: 100%; height: 100%; border: none; }

        .m-title { font-family: 'Orbitron'; color: #fff; font-size: 1.3rem; margin-bottom: 10px; text-transform: uppercase; }
        .m-sub { font-family: 'Orbitron'; color: var(--neon-green); font-size: 0.7rem; margin-bottom: 20px; display: block; letter-spacing: 2px; }
        .m-text { color: #ccc; font-size: 1rem; line-height: 1.6; font-family: 'Rajdhani'; white-space: pre-wrap; }
        
        .btn-close-m { width: 100%; padding: 20px; background: #000; border: none; border-top: 1px solid #111; color: var(--neon-green); font-family: 'Orbitron'; font-size: 0.8rem; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="particles-js"></div>

    <div id="maint-overlay">
        <h1 id="fb-maint-tit" class="maint-tit-clean">AJUSTANDO ZONAS</h1>
        <p id="fb-maint-sub" class="maint-sub-clean">MEJORANDO INTERFAZ</p>
        <div id="timer" class="timer-giant">00:00:00</div>
        <div class="brand-footer">® SAMUEL HACK</div>
    </div>

    <header class="handler">
        <div class="handler-logo">SAMUEL HACK</div>
        <div class="status-pill"><div class="dot"></div> ONLINE</div>
    </header>

    <div class="user-stats-panel">
        <div class="stat-badge">
            <span>VISUALIZACIONES: <span class="stat-value" id="user-count">0</span></span>
            <span style="color: rgba(255,255,255,0.2);">|</span>
            <span>DATA_LOAD: <span class="stat-value">100%</span></span>
        </div>
    </div>

    <div class="main-content">
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> VOLVER AL MENÚ</a>
        <div class="search-area">
            <i class="fas fa-search"></i>
            <input type="text" id="bus" class="search-bar" placeholder="Buscar inteligencia..." onkeyup="filtrar()">
        </div>
        <div class="grid-tips" id="grid"></div>
    </div>

    <div id="modal-tip">
        <div class="m-content">
            <img id="m-img" src="" class="m-header-img">
            <div class="m-inner">
                <h2 id="m-tit" class="m-title"></h2>
                <span id="m-sub" class="m-sub"></span>
                <div id="m-body" class="m-text"></div>
                <div id="v-box" class="video-box">
                    <iframe id="v-player" src="" allowfullscreen></iframe>
                </div>
                <div id="m-body-extra" class="m-text" style="margin-top:15px;"></div>
            </div>
            <button class="btn-close-m" onclick="cerrar()">CERRAR ARTÍCULO</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd2lMfzK96vABG9FVU7aPlbiRvTCFNNNg",
            authDomain: "samuelhackweb.firebaseapp.com",
            databaseURL: "https://samuelhackweb-default-rtdb.firebaseio.com",
            projectId: "samuelhackweb",
            storageBucket: "samuelhackweb.firebasestorage.app",
            messagingSenderId: "398823531934",
            appId: "1:398823531934:web:9a00eef74e8d69a04d628f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- VISTAS ---
        const vRef = ref(db, 'Stats/total_views');
        onValue(vRef, (s) => { if(s.exists()) document.getElementById('user-count').innerText = s.val().toLocaleString(); });

        // --- LÓGICA MANTENIMIENTO ---
        let countdownSecs = 0;
        let timerInterval;

        onValue(ref(db, 'Config'), (snap) => {
            const config = snap.val();
            const overlay = document.getElementById('maint-overlay');
            
            if (config.mantenimiento_activo) {
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                document.getElementById('fb-maint-tit').innerText = config.maint_titulo || "AJUSTANDO ZONAS";
                
                let mins = parseInt(config.maint_tiempo) || 0;
                countdownSecs = mins * 60;

                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if (countdownSecs <= 0) {
                        document.getElementById('timer').innerText = "00:00:00";
                        return;
                    }
                    countdownSecs--;
                    let h = Math.floor(countdownSecs / 3600);
                    let m = Math.floor((countdownSecs % 3600) / 60);
                    let s = countdownSecs % 60;
                    document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            } else {
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
                clearInterval(timerInterval);
            }
        });

        // --- CARGA DE CARDS ---
        onValue(ref(db, 'consejos_card'), (snap) => {
            const grid = document.getElementById('grid');
            const data = snap.val();
            grid.innerHTML = "";
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const i = data[id];
                    grid.innerHTML += `
                        <div class="tip-card item" onclick="leerConsejo('${i.foto}', '${i.titulo}', '${i.tag || 'VIP'}', \`${i.texto}\`, '${i.video || ''}')">
                            <img src="${i.foto}" class="tip-img">
                            <div class="tip-body">
                                <h2 class="tip-title">${i.titulo}</h2>
                                <h3 class="tip-subtitle">${i.tag || 'VIP'}</h3>
                                <p class="tip-preview">${i.texto}</p>
                            </div>
                        </div>`;
                });
            }
        });

        window.leerConsejo = (img, tit, sub, texto, video) => {
            document.getElementById('m-img').src = img;
            document.getElementById('m-tit').innerText = tit;
            document.getElementById('m-sub').innerText = '┃ ' + sub;
            
            const vBox = document.getElementById('v-box');
            const vPlayer = document.getElementById('v-player');
            const mBody = document.getElementById('m-body');
            const mBodyExtra = document.getElementById('m-body-extra');
            
            const lineas = texto.split('\n');
            if(lineas.length > 4 && video !== "") {
                const mitad = Math.floor(lineas.length / 2);
                mBody.innerText = lineas.slice(0, mitad).join('\n');
                mBodyExtra.innerText = lineas.slice(mitad).join('\n');
                mBodyExtra.style.display = "block";
            } else {
                mBody.innerText = texto;
                mBodyExtra.style.display = "none";
            }

            if(video && video !== "") {
                let id = video.split('v=')[1] || video.split('/').pop();
                vPlayer.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
                vBox.style.display = "block";
            } else {
                vPlayer.src = "";
                vBox.style.display = "none";
            }

            const modal = document.getElementById('modal-tip');
            modal.style.display = "flex";
            setTimeout(() => { modal.classList.add('active'); }, 10);
            document.body.style.overflow = "hidden";
        };

        window.cerrar = () => {
            const modal = document.getElementById('modal-tip');
            document.getElementById('v-player').src = "";
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = "none"; }, 300);
            document.body.style.overflow = "auto";
        };
    </script>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": ["#00ff7f", "#00bfff"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 120, "color": "#00ff7f", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        function filtrar() {
            let v = document.getElementById('bus').value.toUpperCase();
            let items = document.getElementsByClassName('item');
            for(let i=0; i<items.length; i++) {
                items[i].style.display = items[i].innerText.toUpperCase().includes(v) ? "" : "none";
            }
        }
    </script>
</body>
</html>
